services:
  ortho-viewer:
    build: .
    ports:
      - "8765:8765"
    volumes:
      - ./data:/data
    environment:
      ADMIN_USER: admin
      ADMIN_PASSWORD: change-me   # required — set a real password before deploying
      # ORTHO_MAX_OPEN: "4"       # optional: how many rasters to keep open at once
    restart: unless-stopped
